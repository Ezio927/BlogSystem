name: 缺陷报告
description: 报告可复现的问题
title: "fix: "
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: 问题描述
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望行为
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: 环境
      placeholder: Windows 11 / Node 22 / Chrome 版本
